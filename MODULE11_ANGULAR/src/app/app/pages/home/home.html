<h1>{{ portalName }}</h1>

<p>Welcome to the Student Course Portal.</p>

<input
  type="text"
  placeholder="Search Courses"
  [(ngModel)]="searchTerm">

<p>Searching for: {{ searchTerm }}</p>

<button
  [disabled]="!isPortalActive"
  (click)="onEnrollClick()">
  Enroll Now
</button>

<p>{{ message }}</p>

<hr>

<h3>Portal Statistics</h3>

<p>Courses Available : {{ availableCourses }}</p>
<p>Enrolled : 3</p>
<p>GPA : 3.8</p>
